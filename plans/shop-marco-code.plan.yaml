# Shop Marco — backlog → Bitrix24
# Dry-run: npm run sync -- plans/shop-marco-code.plan.yaml --dry-run
# Sync:    npm run sync -- plans/shop-marco-code.plan.yaml

project_title: 'Shop Marco — e-commerce'

epic_mode: scrum

epics:
  - name: 'Infra & i18n'
    description: |
      Պրոյեկտի հիմք, միջավայր, բազմալեզու shell։
    tasks:
      - title: 'Նախագծել stack-ը և repo կառուցվածքը'
        description: 'frontend (օր. Next.js), styling, component library; folder structure.'
      - title: 'Կարգավորել development / staging / production environments'
        description: 'env variables, build, deploy pipeline.'
      - title: 'Ներդնել i18n (AM / RU / EN)'
        description: 'routing կամ locale prefix, translation files, fallback, SEO meta per locale.'
      - title: 'Սահմանել design tokens և global layout'
        description: 'typography, spacing, responsive breakpoints, header/footer shell.'
      - title: 'Հաստատել API կոնտրակտը backend-ի հետ'
        description: 'REST/GraphQL, auth headers, error handling.'

  - name: 'Home'
    description: |
      Գլխավոր էջ՝ hero, reels block, featured, promos, trust, reviews, brands, footer։
    tasks:
      - title: 'Ռեալիզացնել Hero / banner section'
        description: 'CMS կամ admin-ից կառավարելի content, CTA.'
      - title: 'Ռեալիզացնել Featured products section'
        description: 'bestsellers կամ curated list, link դեպի PDP.'
      - title: 'Ռեալիզացնել Promotions / special offers block'
        description: 'ակցիաներ, զեղչեր.'
      - title: 'Ռեալիզացնել «Why choose us» section'
        description: '3–4 առավելություն (warranty, fast delivery, installment, original products).'
      - title: 'Ռեալիզացնել customer reviews carousel'
        description: 'rating, text, optional photos.'
      - title: 'Ռեալիզացնել brand partners section'
        description: 'brand logos grid.'
      - title: 'Ռեալիզացնել footer'
        description: 'contacts, social links, map embed, legal/quick links.'
      - title: 'Ռեալիզացնել Reels section (home)'
        description: 'կամ deep link դեպի Reels page (տես Reels epic).'

  - name: 'Shop (PLP)'
    description: |
      Ապրանքների ցուցակ, sort, filters։
    tasks:
      - title: 'Ռեալիզացնել product grid'
        description: 'image, title, key specs, price, brand, warranty badge.'
      - title: 'Ռեալիզացնել sorting'
        description: 'price ASC/DESC, newest, popular.'
      - title: 'Ռեալիզացնել filters'
        description: 'brand, price range, category, technical specs (faceted կամ step filters).'
      - title: 'Ռեալիզացնել pagination կամ infinite scroll'
        description: 'performance և SEO.'
      - title: 'Ռեալիզացնել empty state և loading states'
        description: 'skeleton UI.'

  - name: 'Product (PDP)'
    description: |
      Մեկ ապրանքի էջ։
    tasks:
      - title: 'Ռեալիզացնել product gallery'
        description: 'multiple images, zoom (lightbox կամ inline zoom).'
      - title: 'Ցուցադրել product info'
        description: 'short և full description.'
      - title: 'Ռեալիզացնել technical specifications table'
        description: 'structured attributes.'
      - title: 'Ռեալիզացնել pricing UI'
        description: 'current price, old price, discount badge.'
      - title: 'Ռեալիզացնել quantity selector և Add to cart'
        description: 'client-side cart state կամ API.'
      - title: 'Ցուցադրել stock status'
        description: 'in stock / out of stock.'
      - title: 'Ռեալիզացնել related products'
        description: 'recommendation rule.'
      - title: 'Ռեալիզացնել reviews section'
        description: 'rating aggregate, comments list, submit review (policy-ով).'

  - name: 'Checkout & payments'
    description: |
      Պատվերի ձևակերպում և վճարման եղանակներ։
    tasks:
      - title: 'Ռեալիզացնել checkout form'
        description: 'name, surname, phone, email, address, notes.'
      - title: 'Ռեալիզացնել delivery method selection'
        description: 'integration hint (օր. Yandex delivery) admin business rules-ի հետ.'
      - title: 'Ցուցադրել delivery cost և order total'
        description: 'dynamic recalculation.'
      - title: 'Ռեալիզացնել payment method selection'
        description: 'card vs cash (UI + order payload).'
      - title: 'Ռեալիզացնել order confirmation'
        description: 'order ID, summary email/SMS (եթե scope-ում է).'
      - title: 'Ռեալիզացնել validation և error handling'
        description: 'client + server.'

  - name: 'Account'
    description: |
      Հաճախորդի պրոֆիլ։
    tasks:
      - title: 'Ռեալիզացնել registration / login'
        description: 'email կամ phone, verification flow (եթե պահանջվում է).'
      - title: 'Ռեալիզացնել order history'
        description: 'status, reorder entry point.'
      - title: 'Ռեալիզացնել reorder'
        description: 'cart prefill from past order.'
      - title: 'Ռեալիզացնել address management'
        description: 'CRUD shipping addresses.'
      - title: 'Ռեալիզացնել personal data management'
        description: 'edit profile, password/security.'

  - name: 'Admin: catalog & promos'
    description: |
      Ապրանքներ, կատեգորիաներ, բաններ, ակցիաներ, Product class logic։
    tasks:
      - title: 'Ռեալիզացնել product CRUD'
        description: 'images, specs, pricing, stock, brand, categories.'
      - title: 'Ռեալիզացնել Product class: Retail / Wholesale'
        description: 'field per SKU/product.'
      - title: 'Ռեալիզացնել delivery rules'
        description: 'Retail-only → Yandex delivery; Wholesale կամ mixed cart → free delivery (server-side enforcement).'
      - title: 'Ռեալիզացնել promo codes և discounts'
        description: 'rules, limits, date ranges.'
      - title: 'Ռեալիզացնել banner management'
        description: 'slots, scheduling, links.'
      - title: 'Ռեալիզացնել categories management'
        description: 'tree, SEO fields.'

  - name: 'Admin: orders'
    description: |
      Պատվերների կառավարում։
    tasks:
      - title: 'Ռեալիզացնել orders list'
        description: 'filters: New, In process, Delivered, Canceled.'
      - title: 'Ռեալիզացնել order details view'
        description: 'line items, customer, payment, delivery.'
      - title: 'Ռեալիզացնել order status updates'
        description: 'audit trail կամ timestamp.'
      - title: 'Ավելացնել admin comment field'
        description: 'internal notes.'

  - name: 'Admin: analytics'
    description: |
      Dashboard վիճակագրություն։
    tasks:
      - title: 'Ռեալիզացնել sales KPIs'
        description: 'total orders, revenue, AOV.'
      - title: 'Ռեալիզացնել order status breakdown'
        description: 'by status, today / week / month.'
      - title: 'Ռեալիզացնել product analytics'
        description: 'top 5 best sellers, least selling.'
      - title: 'Ռեալիզացնել stock analytics'
        description: 'low stock, out of stock lists.'
      - title: 'Ռեալիզացնել customer analytics'
        description: 'new vs repeat, top customers by spend.'
      - title: 'Ռեալիզացնել dashboard widgets'
        description: 'today’s sales, monthly sales, top product.'

  - name: 'Reels'
    description: |
      Տեսադարան vertical feed։
    tasks:
      - title: 'Ռեալիզացնել dedicated Reels page'
        description: 'vertical video feed UI.'
      - title: 'Ռեալիզացնել like functionality'
        description: 'vertical video feed-ում.'
      - title: 'Ռեալիզացնել mute/unmute և play/pause'
        description: 'mobile-friendly gestures.'
      - title: 'Հաստատել content source'
        description: 'admin upload vs external URLs, moderation.'

  - name: 'Site-wide'
    description: |
      Global search, wishlist, compare, static pages։
    tasks:
      - title: 'Ռեալիզացնել global search'
        description: 'products, categories; debounce; empty results.'
      - title: 'Ռեալիզացնել wishlist'
        description: 'persist per user/session.'
      - title: 'Ռեալիզացնել compare products'
        description: 'spec diff table, max N items.'
      - title: 'Ռեալիզացնել About Us, Contact Us, brand pages'
        description: 'CMS կամ static content.'
      - title: 'Ռեալիզացնել legal pages'
        description: 'Privacy Policy, Terms & Conditions, Refund Policy, Delivery Policy (per locale).'
      - title: 'Ռեալիզացնել contact form'
        description: 'validation, spam protection.'
      - title: 'SEO և accessibility pass'
        description: 'meta, structured data, keyboard, contrast.'

  - name: 'QA & launch'
    description: |
      Վերջնական որակ և գործարկում։
    tasks:
      - title: 'Ստեղծել E2E smoke suite'
        description: 'home → PLP → PDP → cart → checkout (happy path).'
      - title: 'Կատարել cross-browser և mobile testing'
        description: ''
      - title: 'Պլանավորել performance'
        description: 'Core Web Vitals, image optimization.'
      - title: 'Պլանավորել monitoring և error tracking'
        description: 'օր. Sentry, logs.'
      - title: 'Պատրաստել launch checklist'
        description: 'DNS, SSL, backups, rollback.'
