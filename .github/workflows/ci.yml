name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          # Must match package.json "packageManager" — avoids lockfile parse mismatches in CI.
          version: 9.15.4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm run build
        env:
          DATABASE_URL: postgresql://build:build@localhost:5432/build
          AUTH_SECRET: ci-build-placeholder-not-for-production-use-32chars
