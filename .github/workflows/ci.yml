name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Corepack must run BEFORE setup-node so that `cache: 'pnpm'` can resolve
      # `pnpm store path`. Avoid pnpm/action-setup@v6 + pnpm 9: the v6 bootstrap
      # can invoke pnpm 11 paths and break lockfile parsing ("expected a single
      # document…"). Corepack runs the exact pnpm from package.json
      # "packageManager".
      - name: Enable Corepack (pnpm from packageManager)
        run: |
          corepack enable
          corepack prepare "$(node -p "require('./package.json').packageManager")" --activate
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Validate pnpm-lock.yaml (single YAML document, no merge junk)
        run: |
          set -euo pipefail
          if ! grep -q '^lockfileVersion:' pnpm-lock.yaml; then
            echo 'pnpm-lock.yaml: missing lockfileVersion'
            exit 1
          fi
          if [ "$(grep -c '^lockfileVersion:' pnpm-lock.yaml)" -ne 1 ]; then
            echo 'pnpm-lock.yaml: expected exactly one lockfileVersion (merge conflict or duplicated lockfile?)'
            exit 1
          fi
          if grep -nE '^(<<<<<<<|=======|>>>>>>>)' pnpm-lock.yaml; then
            echo 'pnpm-lock.yaml: unresolved git merge conflict markers'
            exit 1
          fi
          if grep -q '^---$' pnpm-lock.yaml; then
            echo 'pnpm-lock.yaml: line "---" starts a second YAML document; keep a single lockfile'
            exit 1
          fi
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm run build
        env:
          DATABASE_URL: postgresql://build:build@localhost:5432/build
          AUTH_SECRET: ci-build-placeholder-not-for-production-use-32chars
