name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      # Avoid pnpm/action-setup@v6 + pnpm 9: the v6 bootstrap can invoke pnpm 11 paths and
      # break lockfile parsing ("expected a single document…"). Corepack runs the exact
      # pnpm from package.json "packageManager".
      - name: Enable Corepack (pnpm from packageManager)
        run: |
          corepack enable
          corepack prepare "$(node -p "require('./package.json').packageManager")" --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm run build
        env:
          DATABASE_URL: postgresql://build:build@localhost:5432/build
          AUTH_SECRET: ci-build-placeholder-not-for-production-use-32chars
